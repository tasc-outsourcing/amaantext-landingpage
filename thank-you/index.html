    <style>
        :root {
            --brand: #005f83;
            --brand-dark: #003d54;
            --yellow: #ffe102;
            --green: #56db46;
            --cyan: #00bfff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Poppins", Arial, sans-serif;
            color: var(--brand);
            background: #f7fbfd;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: #fff;
            box-shadow: 0 4px 16px rgba(15, 23, 42, 0.08);
        }

        .nav {
            width: min(1180px, calc(100% - 48px));
            min-height: 88px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 28px;
        }

        .logo img {
            display: block;
            width: 180px;
            height: auto;
        }

        .nav-links,
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 32px;
            font-size: 15px;
            color: rgba(0, 0, 0, 0.82);
        }

        .nav-links a {
            position: relative;
            transition: color 180ms ease;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -7px;
            width: 0;
            height: 2px;
            background: var(--yellow);
            transition: width 180ms ease;
        }

        .nav-links a:hover {
            color: var(--brand);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .trial-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 24px;
            border-radius: 999px;
            color: #fff;
            font-weight: 600;
            background: linear-gradient(90deg, var(--cyan), var(--green));
            box-shadow: 0 10px 28px rgba(0, 191, 255, 0.18);
        }

        main {
            min-height: 100vh;
            padding-top: 88px;
        }

        .thank-you-section {
            position: relative;
            min-height: calc(100vh - 88px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 72px 24px;
            border-top: 8px solid var(--yellow);
        }

        .thank-you-section::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.05;
            background-image:
                linear-gradient(rgba(0, 95, 131, 0.45) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 95, 131, 0.45) 1px, transparent 1px);
            background-size: 56px 56px;
        }

        .thank-you-card {
            position: relative;
            width: min(760px, 100%);
            text-align: center;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            color: #fff;
            background: var(--green);
            box-shadow: 0 18px 50px rgba(86, 219, 70, 0.28);
        }

        .checkmark svg {
            width: 44px;
            height: 44px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
            padding: 10px 18px;
            border: 1px solid rgba(0, 95, 131, 0.1);
            border-radius: 999px;
            background: #fff;
            color: var(--brand);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            box-shadow: 0 12px 34px rgba(0, 95, 131, 0.08);
        }

        h1 {
            margin: 0 0 22px;
            color: var(--brand);
            font-size: clamp(44px, 8vw, 68px);
            font-weight: 600;
            line-height: 1.08;
            letter-spacing: 0;
        }

        .message {
            max-width: 700px;
            margin: 0 auto 40px;
            color: #5f6f7a;
            font-size: clamp(20px, 3vw, 24px);
            line-height: 1.6;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .primary-action,
        .secondary-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 54px;
            padding: 0 28px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 700;
        }

        .primary-action {
            background: var(--brand);
            color: #fff;
        }

        .secondary-action {
            background: #fff;
            color: var(--brand);
            border: 2px solid rgba(0, 95, 131, 0.2);
        }

        footer {
            padding: 28px 24px;
            background: var(--brand-dark);
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 13px;
        }

        @media (max-width: 920px) {
            .nav-links {
                display: none;
            }
        }

        @media (max-width: 680px) {
            .nav {
                width: min(100% - 32px, 1180px);
                min-height: 78px;
            }

            .logo img {
                width: 150px;
            }

            .nav-actions a:first-child {
                display: none;
            }

            .trial-button {
                min-height: 42px;
                padding: 0 16px;
                font-size: 13px;
            }

            main {
                padding-top: 78px;
            }

            .thank-you-section {
                min-height: calc(100vh - 78px);
            }
        }
    </style>
</head>

                <a href="/#Features">Features</a>

                    </svg>
                </div>

                <div class="status-pill">Request received</div>

                <h1>Thank you</h1>

                <p class="message">Your request is under process. We will reach out to you shortly.</p>

                <div class="actions">
                    <a class="primary-action" href="/">Back to Home</a>
                    <a class="secondary-action" href="/#Features">Explore Features</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        © 2026 Tasctranslate.ai. Enterprise AI Translation Software for Arabic & English Documents in the GCC.
